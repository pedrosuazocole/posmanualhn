# ══════════════════════════════════════════════════════════
#  MetricPOS — Nginx Reverse Proxy
#  Colocar en: /etc/nginx/sites-available/metricpos
#  Activar:    ln -s /etc/nginx/sites-available/metricpos /etc/nginx/sites-enabled/
#  SSL con:    certbot --nginx -d tu-dominio.com
# ══════════════════════════════════════════════════════════

server {
    listen 80;
    server_name tu-dominio.com www.tu-dominio.com;

    # Redirigir HTTP → HTTPS (descomentar después de instalar SSL)
    # return 301 https://$server_name$request_uri;

    # ── Proxy al servidor Node.js ──────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Archivos estáticos: caché agresivo ────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        expires            30d;
        add_header         Cache-Control "public, immutable";
    }

    # ── PWA: Service Worker sin caché ─────────────────
    location = /sw.js {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host $host;
        add_header         Cache-Control "no-cache, no-store, must-revalidate";
        add_header         Service-Worker-Allowed "/";
    }

    # ── Seguridad: bloquear archivos sensibles ─────────
    location ~ /\. { deny all; }
    location = /package.json { deny all; }
    location = /.env { deny all; }

    # Límite de tamaño de uploads (para adjuntos de tickets)
    client_max_body_size 15M;
}

